<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Transmisiones</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#1c1c1c;
    text-align:center;
    padding:15px;
    font-size:30px;
    font-weight:bold;
}

.menu{
    text-align:center;
    padding:20px;
}

button{
    padding:12px 25px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

.player{
    width:90%;
    max-width:1200px;
    height:675px;
    margin:20px auto;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:black;
}
</style>
</head>

<body>

<header>
📺 Centro de Transmisiones
</header>

<div class="menu">
    <button onclick="cargar(1)">Canal 1</button>
    <button onclick="cargar(2)">Canal 2</button>
    <button onclick="cargar(3)">Canal 3</button>
</div>

<div class="player">
    <iframe
    id="visor"
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen>
</iframe>
</div>

<script>
function cargar(canal){

    if(canal==1){
        document.getElementById("visor").src =
        "https://streamtp-abc.net/global1.php?stream=tycsports";
    }

    if(canal==2){
        document.getElementById("visor").src =
        "https://streamtp-abc.net/global1.php?stream=espn";
    }

    if(canal==3){
        document.getElementById("visor").src =
        "nada";
    }

}
</script>
 

</body>
</html>
