<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Transmisión</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#1a1a1a;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.player{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    display:none;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    padding:20px 40px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.info{
    margin-top:20px;
    background:#1a1a1a;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
⚽ Mi Transmisión
</header>

<div class="container">

<div class="player">

<button class="play" onclick="iniciar()">
▶ VER EN VIVO
</button>

<iframe id="stream"
src="https://vdo.ninja/?view=TU_ID"></iframe>

</div>

<div class="info">
<h2>Transmisión en Vivo</h2>
<p>Haz clic en "VER EN VIVO" para cargar el stream.</p>
</div>

</div>

<script>
function iniciar(){
    document.querySelector(".play").style.display="none";
    document.getElementById("stream").style.display="block";
}
</script>

</body>
</html>
